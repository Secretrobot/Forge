<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forge v2</title>

<style>
:root{
  --bg:#0b1020;
  --card:#151c33;
  --card2:#1c2547;
  --text:#fff;
  --muted:#a9b6d3;
  --accent:#4da6ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:540px;
  margin:0 auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}

.between{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.row{
  display:flex;
  gap:8px;
  align-items:center;
}

button{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  font-weight:700;
  background:#2a3a7a;
  color:#fff;
}

.pill{
  background:var(--card2);
}

.icon-btn{
  width:40px;
  height:40px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.exercise{
  margin-top:10px;
  padding:10px;
  background:var(--card2);
  border-radius:12px;
}

.small{font-size:12px;color:var(--muted)}
.big{font-size:18px;font-weight:800}

.year-nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.day{
  width:10px;
  height:10px;
  display:inline-block;
  margin:1px;
  background:#222;
  border-radius:2px;
}

.workout{background:var(--accent)}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
}

.modal.open{display:flex}

.sheet{
  background:#11182f;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:420px;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">
    <div class="between">
      <div>
        <div class="big">Forge</div>
        <div class="small">Training log</div>
      </div>
    </div>
  </div>

  <!-- YEAR VIEW -->
  <div class="card">
    <div class="year-nav">
      <button onclick="changeYear(-1)">←</button>
      <div id="yearLabel"></div>
      <button onclick="changeYear(1)">→</button>
    </div>
    <div id="yearGrid"></div>
  </div>

  <!-- EXERCISES -->
  <div class="card">
    <div class="big">Exercises</div>
    <div id="exerciseList"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="sheet" id="sheet"></div>
</div>

<script>

/* =========================
   VIDEO LIBRARY
========================= */

const videoLibrary = {
  "Bench Press":"https://www.youtube.com/watch?v=rT7DgCr-3pg",
  "Incline Dumbbell Press":"https://www.youtube.com/watch?v=8iPEnn-ltC8",
  "Shoulder Press":"https://www.youtube.com/watch?v=B-aVuyhvLHU",
  "Triceps Pushdown":"https://www.youtube.com/watch?v=2-LAMcpzODU",

  "Lat Pulldown":"https://www.youtube.com/watch?v=CAwf7n6Luuc",
  "Row":"https://www.youtube.com/watch?v=HJSVR_67OlM",
  "Face Pull":"https://www.youtube.com/watch?v=rep-qVOkqgk",
  "Bicep Curl":"https://www.youtube.com/watch?v=ykJmrZ5v0Oo",

  "Leg Press":"https://www.youtube.com/watch?v=IZxyjW7MPJQ",
  "Romanian Deadlift":"https://www.youtube.com/watch?v=2SHsk9AzdjA",
  "Leg Curl":"https://www.youtube.com/watch?v=1Tq3QdYUuHs",
  "Calf Raise":"https://www.youtube.com/watch?v=-M4-G8p8fmc",

  "Run":"https://www.youtube.com/watch?v=_kGESn8ArrU"
};

/* =========================
   EXERCISES + TIPS
========================= */

const exercises = [
{
name:"Bench Press",
tips:[
"Feet planted",
"Shoulder blades retracted",
"Bar to mid chest",
"Controlled descent"
]
},
{
name:"Lat Pulldown",
tips:[
"Elbows drive down",
"Chest up",
"No swinging",
"Control return"
]
},
{
name:"Leg Press",
tips:[
"Feet shoulder width",
"Push through heels",
"No knee lockout",
"Full control"
]
}
];

/* =========================
   YEAR LOGIC
========================= */

let currentYear = new Date().getFullYear();

function changeYear(d){
  currentYear += d;
  renderYear();
}

function renderYear(){
  document.getElementById("yearLabel").textContent=currentYear;

  let html="";

  for(let m=0;m<12;m++){
    html+="<div>";
    for(let d=0;d<30;d++){
      html+=`<span class="day ${Math.random()>0.85?'workout':''}"></span>`;
    }
    html+="</div>";
  }

  document.getElementById("yearGrid").innerHTML=html;
}

/* =========================
   EXERCISES UI
========================= */

function renderExercises(){

  document.getElementById("exerciseList").innerHTML =
    exercises.map((ex,i)=>`
      <div class="exercise">

        <div class="between">
          <div>${ex.name}</div>

          <div class="row">
            <button class="icon-btn pill" onclick="openVideo('${ex.name}')">▶</button>
            <button class="icon-btn pill" onclick="openTips(${i})">💡</button>
          </div>
        </div>

      </div>
    `).join("");
}

/* =========================
   MODAL
========================= */

function openVideo(name){
  const url=videoLibrary[name];
  if(url) window.open(url,"_blank");
}

function openTips(i){
  const ex=exercises[i];

  document.getElementById("sheet").innerHTML=`
    <div style="font-size:18px;font-weight:800;margin-bottom:10px">
      ${ex.name}
    </div>

    ${ex.tips.map(t=>`
      <div class="card">${t}</div>
    `).join("")}

    <button onclick="closeModal()">Close</button>
  `;

  document.getElementById("modal").classList.add("open");
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
}

/* =========================
   INIT
========================= */

renderYear();
renderExercises();

</script>

</body>
</html>
